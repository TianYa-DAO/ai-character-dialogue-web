<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI人物对话Web可视化平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .feature h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature p {
            color: #666;
            font-size: 0.9em;
        }
        
        .cta-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .repo-link {
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .repo-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI人物对话Web可视化平台</h1>
        <p class="subtitle">
            基于 Hermes Roleplay Engine 的沉浸式 AI 角色对话 Web 可视化平台<br>
            让每次对话都有可追溯的行为逻辑
        </p>
        
        <div class="features">
            <div class="feature">
                <h3>🎭 角色扮演</h3>
                <p>5维心理建模，让AI真正"成为"角色</p>
            </div>
            <div class="feature">
                <h3>💬 实时对话</h3>
                <p>SSE实时消息推送，流畅的对话体验</p>
            </div>
            <div class="feature">
                <h3>📚 世界书</h3>
                <p>关键词触发式描写规范注入</p>
            </div>
            <div class="feature">
                <h3>💾 存档系统</h3>
                <p>每角色3槽位，支持手动/自动存档</p>
            </div>
        </div>
        
        <button class="cta-button" onclick="window.open('https://github.com/TianYa-DAO/aichat', '_blank')">
            查看项目源码
        </button>
        
        <p class="repo-link">
            GitHub: <a href="https://github.com/TianYa-DAO/aichat" target="_blank">TianYa-DAO/aichat</a>
        </p>
    </div>
</body>
</html>
